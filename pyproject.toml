[project]
name = "vgi"
version = "0.7.0"
description = "Vector Gateway Interface - Connect DuckDB to external programs via Apache Arrow"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "click",
    "pyarrow",
    "sqlglot",
    "typer>=0.9",
    "platformdirs",
    "numpy>=2.4.1",
    "vgi-rpc @ file:///Users/rusty/Development/vgi-rpc",
    "duckdb>=1.5.0",
]

[project.optional-dependencies]
http = ["vgi-rpc[http]"]
oauth = ["vgi-rpc[oauth]"]
otel = ["vgi-rpc[otel]"]
azure = [
    "pymssql>=2.3.0",
    "azure-identity>=1.16.0",
]
dev = [
    "mypy",
    "pyarrow-stubs",
    "pytest",
    "pytest-cov",
    "pytest-examples",
    "pytest-ruff",
    "pytest-xdist",
    "ruff",
    "vgi-rpc[conformance,external,http,oauth,otel]",
]
[project.scripts]
vgi-serve = "vgi.serve:main"
vgi-client = "vgi.client.cli:main"
vgi-example-worker = "vgi.examples.worker:main"
vgi-example-http = "vgi.examples.http_server:main"
vgi-example-versioned-worker = "vgi.examples.versioned:main"
vgi-example-versioned-tables-worker = "vgi.examples.versioned_tables:main"
vgi-example-attach-options-worker = "vgi.examples.attach_options:main"
vgi-example-writable-worker = "vgi.examples.writable_worker:main"
vgi-transactor = "vgi.transactor.server:main"

[tool.hatch.metadata]
allow-direct-references = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
exclude = ["vgi/codegen"]

[tool.hatch.build.targets.sdist]
exclude = []

[tool.ruff]
line-length = 120
target-version = "py313"
exclude = ["duckdb"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "D"]
ignore = [
    "D203", # incompatible with D211 (no-blank-line-before-class)
    "D213", # incompatible with D212 (multi-line-summary-first-line)
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = "typer.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# These files have type: ignore comments for ty that mypy doesn't need
module = ["vgi.examples.scalar", "vgi.table_function"]
warn_unused_ignores = false

[tool.ty.environment]
python-version = "3.13"

[tool.pytest.ini_options]
addopts = "--ruff"
testpaths = ["tests"]

[tool.coverage.run]
# Enable subprocess coverage - automatically patches subprocess.Popen
# to inject coverage measurement into spawned worker processes
patch = ["subprocess"]
# Each subprocess writes to its own data file (.coverage.<hostname>.<pid>)
parallel = true
# Handle SIGTERM gracefully (writes coverage data before exit)
sigterm = true
# Measure branch coverage
branch = true
# What to measure
source = ["vgi"]
# Omit test files and examples from coverage
omit = ["vgi/examples/*", "tests/*"]

[tool.coverage.report]
# Fail if coverage drops below this threshold
fail_under = 80
# Show missing lines in the report
show_missing = true
# Exclude common patterns from coverage
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@overload",
    "raise NotImplementedError",
    "\\.\\.\\.",                  # Ellipsis in stub files
]

[tool.coverage.html]
directory = "htmlcov"

[tool.uv.sources]
# duckdb = { path = "/Users/rusty/Development/duckdb-python/dist/duckdb-1.6.0.dev15-cp314-cp314-macosx_15_0_arm64.whl" }

[dependency-groups]
dev = ["lxml>=6.0.2", "pytest-timeout>=2.4.0", "ty>=0.0.8"]
