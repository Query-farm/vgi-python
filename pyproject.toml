[project]
name = "vgi"
version = "0.1.0"
description = "Vector Gateway Interface - Connect DuckDB to external programs via Apache Arrow"
readme = "README.md"
requires-python = ">=3.12.4"
dependencies = ["click", "pyarrow", "structlog", "platformdirs"]

[project.optional-dependencies]
dev = ["mypy", "pyarrow-stubs", "pytest", "pytest-cov", "pytest-mypy", "pytest-ruff", "pytest-xdist", "ruff"]

[project.scripts]
vgi-client = "vgi.client.cli:main"
vgi-example-worker = "vgi.examples.worker:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = ["duckdb"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "D"]
ignore = [
    "D203", # incompatible with D211 (no-blank-line-before-class)
    "D213", # incompatible with D212 (multi-line-summary-first-line)
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = "structlog.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "--mypy --ruff"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "lxml>=6.0.2",
    "pytest-timeout>=2.4.0",
]
