# Copyright 2025, 2026 Query Farm LLC - https://query.farm
#
# Companion distribution for the example/test VGI workers. The base `vgi` wheel
# excludes vgi/_test_fixtures; this package ships that subtree back into the
# installed `vgi/` package directory and registers the vgi-fixture-* console
# commands. Install on demand via `pip install vgi-fixtures` or `vgi[fixtures]`.
# Source lives at the repo root in vgi/_test_fixtures/ so the dev/CI workspace
# and the conformance suite import it by its normal `vgi._test_fixtures` path.
[project]
name = "vgi-fixtures"
version = "0.8.0"
description = "Example/test VGI worker modules and entry points (not for production use)"
readme = "README.md"
license = { file = "../../LICENSE" }
requires-python = ">=3.13"
# The fixture modules import numpy (test-fixtures) and sqlglot (transactor, used
# by the writable workers); test-fixtures-writable pulls both transitively.
# The fixture worker also builds statistics fixtures at import time, which
# needs a DuckDB-compatible engine — vgi[duckdb] keeps the default dev env on
# stock duckdb (the resolver prefers haybarn whenever it is installed too).
dependencies = ["vgi[test-fixtures-writable]", "vgi[duckdb]"]

[project.scripts]
vgi-fixture-worker = "vgi._test_fixtures.worker:main"
vgi-fixture-http = "vgi._test_fixtures.http_server:main"
vgi-fixture-versioned-worker = "vgi._test_fixtures.versioned:main"
vgi-fixture-versioned-tables-worker = "vgi._test_fixtures.versioned_tables:main"
vgi-fixture-attach-options-worker = "vgi._test_fixtures.attach_options:main"
vgi-fixture-bad-protocol-worker = "vgi._test_fixtures.bad_protocol:main"
vgi-fixture-writable-worker = "vgi._test_fixtures.writable.worker:main"
vgi-fixture-simple-writable-worker = "vgi._test_fixtures.simple_writable:main"

[tool.uv.sources]
vgi = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# PUBLISH WHEEL ONLY. The fixture source lives at the repo root in
# vgi/_test_fixtures/, outside this package's root. hatchling's force-include can
# pull it into the *wheel* (a flat install image), but an sdist is rooted at the
# package dir and cannot reach `../../` — building from such an sdist yields a
# silently empty wheel. Since this is a pure-python `py3-none-any` wheel that
# installs everywhere, the wheel alone is sufficient. The release workflow builds
# `--wheel` only for this package; do not publish its sdist.
[tool.hatch.build.targets.wheel]
# Ship the fixture subtree (which lives at the repo root) into the installed
# `vgi/` package directory. The base `vgi` wheel excludes this path, so the two
# wheels overlay cleanly: `vgi` owns the runtime modules, this owns _test_fixtures.
bypass-selection = true
[tool.hatch.build.targets.wheel.force-include]
"../../vgi/_test_fixtures" = "vgi/_test_fixtures"
