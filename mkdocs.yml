site_name: vgi-python
site_description: "vgi-python: extend DuckDB with functions written in Python (or any language) over Apache Arrow IPC — scalar, table, table-in-out, and aggregate functions, catalogs, and stateful workers"
site_url: https://vgi-python.query.farm/
repo_url: https://github.com/Query-farm/vgi-python
repo_name: Query-farm/vgi-python
copyright: "&copy; 2026 <a href=\"https://query.farm\">Query.Farm LLC</a>"

extra:
  social:
    - icon: material/web
      link: https://query.farm
      name: 🚜 Query.Farm
    - icon: material/arrow-right-bold-circle
      link: https://vgi-rpc-python.query.farm/
      name: vgi-rpc (RPC layer)
    - icon: fontawesome/brands/github
      link: https://github.com/Query-farm
      name: 🚜 Query.Farm on GitHub

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .
  - attr_list
  - md_in_html

plugins:
  - search
  - section-index
  - d2:
      layout: dagre
      theme: 104
      dark_theme: 200
      pad: 100
      cache: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_bases: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: false
            heading_level: 2
            members_order: source
            show_if_no_docstring: false
            docstring_style: google
            docstring_section_style: spacy
            merge_init_into_class: true
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true

nav:
  - Home: index.md
  - Tutorial:
    - tutorial/index.md
    - 1. Scalar function: tutorial/scalar.md
    - 2. Table function: tutorial/table.md
  - How-to guides:
    - how-to/index.md
    - Function patterns: how-to/function-patterns.md
    - Function API (advanced): generator-api.md
    - Aggregate Functions: aggregate-functions.md
    - Expose a catalog: how-to/catalogs.md
    - Catalog Interface (reference): catalog-interface.md
    - Shared Storage: shared-storage.md
    - Authentication: authentication.md
    - Filter Pushdown: filter-pushdown.md
    - Column Statistics: column-statistics.md
    - Function Metadata: metadata.md
    - CLI: cli.md
  - Concepts:
    - concepts/index.md
    - Function Lifecycle: lifecycle.md
    - Argument Serialization: argument-serialization.md
  - API Reference:
    - api/index.md
    - Functions: api/functions.md
    - Arguments & Schema: api/arguments.md
    - Worker & Serving: api/worker.md
    - Client: api/client.md
    - Catalogs: api/catalogs.md
    - State Storage: api/storage.md
    - Metadata & Protocol: api/metadata.md
    - Filter Pushdown: api/filters.md
    - Auth & Secrets: api/auth.md
    - Observability: api/observability.md
    - HTTP: api/http.md
    - Transactor: api/transactor.md
    - Exceptions: api/exceptions.md
  - Contributing to docs: contributing-docs.md
